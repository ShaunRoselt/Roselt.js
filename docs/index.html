<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Roselt.js</title>
		<meta
			name="description"
			content="Roselt.js is a file-based vanilla JavaScript app framework for full web applications, product sites, and desktop-ready shells."
		>
		<link
			rel="icon"
			href="assets/roselt-logo.svg"
		>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css">
		<!-- <link rel="stylesheet" href="index.css"> -->
		<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
	</head>
	<body>
		<script>
			// Apply saved theme immediately to prevent flash
			(function() {
				var t = localStorage.getItem('roselt-theme');
				if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', t);
			})();
		</script>

		<div class="site-shell">
			<roselt section="site-header"></roselt>

			<div class="site-main" id="main-content">
				<div class="site-page-column">
					<roselt page="home" navigate></roselt>
				</div>
			</div>

			<roselt section="site-footer"></roselt>
		</div>

		<!-- <script src="index.js"></script> -->
		 
		<!-- <script src="../dist/roselt.js"></script> -->
		<script src="https://cdn.jsdelivr.net/gh/ShaunRoselt/Roselt.js@latest/dist/roselt.js"></script>
		<script>
			window.Roselt.start().then(function(app) {
				window.initializeSiteChrome?.(app);
			});
		</script>
	</body>
</html>
